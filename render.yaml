services:
  - type: web
    name: rsy-battle-whatsapp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: API_SECRET
        value: rsybattle_wa_2024
      - key: NODE_ENV
        value: production
    disk:
      name: whatsapp-auth
      mountPath: /tmp/wwebjs_auth
      sizeGB: 1
